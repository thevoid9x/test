<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PS4 WebKit Fast Auto Probe</title>
<style>
body{margin:0;background:#080b10;color:#eef4fb;font:18px Arial,sans-serif}
main{padding:18px;max-width:980px;margin:auto}
h1{font-size:26px;margin:0 0 8px}
.row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.box{background:#141b26;border:1px solid #334158;border-radius:6px;padding:10px;min-width:130px}
.box span{display:block;color:#9badc3;font-size:12px}.box b{font-size:24px}
#log{white-space:pre-wrap;background:#05070a;border:1px solid #334158;border-radius:6px;padding:12px;min-height:360px;font:14px Consolas,monospace;overflow:auto}
.ok{color:#78e08e}.bad{color:#ff7474}.warn{color:#ffd36c}
button{font-size:18px;padding:10px 14px;margin:4px;background:#1b2636;color:white;border:1px solid #506077;border-radius:6px}
</style>
</head>
<body>
<main>
<h1>PS4 WebKit Fast Auto Probe</h1>
<p>This page auto-runs. Refresh after each edit. Watch for BAD, exception, reload, freeze, or crash.</p>
<button onclick="start()">Start</button><button onclick="stop()">Stop</button><button onclick="clearLog()">Clear</button>
<div class="row">
<div class="box"><span>STATE</span><b id="state">boot</b></div>
<div class="box"><span>CALLS</span><b id="calls">0</b></div>
<div class="box"><span>GL</span><b id="glcalls">0</b></div>
<div class="box"><span>FAIL</span><b id="fail">0</b></div>
</div>
<div id="log"></div>
</main>
<script>
var running=false,calls=0,glcalls=0,failures=0,roots=[],gl=null;
function byId(x){return document.getElementById(x)}
function setState(s){byId("state").textContent=s;byId("calls").textContent=String(calls);byId("glcalls").textContent=String(glcalls);byId("fail").textContent=String(failures)}
function log(s,c){var d=document.createElement("div");d.className=c||"";d.textContent=(new Date()).toISOString()+"  "+s;byId("log").appendChild(d);byId("log").scrollTop=999999}
function clearLog(){byId("log").innerHTML=""}
window.onerror=function(m,u,l,col,e){failures++;setState("error");log("GLOBAL ERROR: "+m+" line="+l+" col="+col,"bad");if(e&&e.stack)log(e.stack,"bad")}
function feature(n,v){log(n+": "+(v?"yes":"no"),v?"ok":"warn")}
function fingerprint(){
 log("UA: "+navigator.userAgent,"warn");
 feature("Worker",typeof Worker!="undefined");
 feature("WebAssembly",typeof WebAssembly!="undefined");
 feature("WebGL",typeof WebGLRenderingContext!="undefined");
 feature("WebGL2",typeof WebGL2RenderingContext!="undefined");
 feature("SharedArrayBuffer",typeof SharedArrayBuffer!="undefined");
 feature("ArrayBuffer.resize",!!(window.ArrayBuffer&&ArrayBuffer.prototype&&ArrayBuffer.prototype.resize));
}
function bad(n,g,w){failures++;setState("bad");log("BAD "+n+" got="+String(g)+" want="+String(w),"bad");throw new Error(n)}
function shape(i){var r=i&7;if(r==0)return{a:i,b:i+1};if(r==1)return{a:i+0.5,b:-i};if(r==2)return{a:{i:i},b:[i]};if(r==3)return Object.create({a:7,b:8});return{a:"a"+i,b:"b"+i}}
function jsc(i){
 var o=shape(i),a=new Array(8);
 if(i&1)a[0]=o.a;else a[1]=o.b;
 if(a[3]!==void 0)bad("array-hole",a[3],"undefined");
 var b=[1,2,3].concat([4,5]);if(b.length!==5)bad("concat",b.length,5);
 var t=new Uint32Array(64);t[(i*17)&63]=i;if(t.length!==64)bad("typed-length",t.length,64);
 var s=("x").repeat?("x").repeat((i&127)+1):new Array((i&127)+2).join("x");if(s.length<1)bad("string",s.length,">0");
 if((i&255)===0){var junk=[];for(var k=0;k<900;k++)junk.push({k:k,s:"g"+i+"-"+k});roots.push(junk);if(roots.length>8)roots.shift()}
 calls++;
}
function makeGL(){try{var c=document.createElement("canvas");c.width=128;c.height=128;return c.getContext("webgl2")||c.getContext("webgl")||c.getContext("experimental-webgl")}catch(e){log("GL init threw "+e,"warn");return null}}
function gltest(i){
 if(!gl)return;
 var sz=16+(i&63),data=new Uint8Array(sz*sz*4);
 for(var p=0;p<data.length;p+=4){data[p]=i&255;data[p+1]=p&255;data[p+2]=(i+p)&255;data[p+3]=255}
 var tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
 gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
 gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,sz,sz,0,gl.RGBA,gl.UNSIGNED_BYTE,data);
 gl.generateMipmap(gl.TEXTURE_2D);var e=gl.getError();gl.deleteTexture(tex);
 if(e!==gl.NO_ERROR&&e!==gl.INVALID_OPERATION)log("GL unusual error 0x"+e.toString(16),"warn");
 glcalls++;
}
function tick(){
 if(!running)return;
 try{
  var start=Date.now();
  while(Date.now()-start<80){for(var i=0;i<250;i++)jsc(calls+i);gltest(glcalls)}
  setState("running");
  if((calls%10000)<250)log("ALIVE ok calls="+calls+" gl="+glcalls,"ok");
  setTimeout(tick,0);
 }catch(e){failures++;running=false;setState("stopped");log("EXCEPTION "+(e&&e.stack?e.stack:e),"bad")}
}
function start(){if(running)return;running=true;setState("running");log("START auto probe","warn");gl=makeGL();tick()}
function stop(){running=false;setState("stopped");log("STOP","warn")}
fingerprint();setState("ready");log("AUTO START in 1 second","warn");setTimeout(start,1000);
</script>
</body>
</html>
