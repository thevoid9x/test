<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PS4 JSC</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; }
  body { max-width: 820px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  button { margin: .35rem .35rem .35rem 0; padding: .75rem 1rem; font-size: 1rem; }
  pre { min-height: 18rem; padding: 1rem; white-space: pre-wrap; overflow-wrap: anywhere; background: #1d1d1d; border: 1px solid #444; }
  .warning { color: #ffd479; }
</style>

<h1>PS4 JSC polymorphic-call</h1>
<p class="warning">Test</p>
<button id="primary">Test caller teardown</button>
<button id="secondary">Test stub replacement</button>
<button id="stress">Run combined 16 rounds</button>
<button id="clear">Clear saved log</button>
<pre id="log"></pre>

<script>
(() => {
  "use strict";

  const output = document.querySelector("#log");
  const buttons = [...document.querySelectorAll("button")];
  let busy = false;
  let checksum = 0;

  function log(message) {
    const line = `[${new Date().toISOString()}] ${message}`;
    output.textContent += `${line}\n`;
    console.log(line);
    try {
      localStorage.setItem("polycall-probe-log", output.textContent.slice(-24000));
    } catch (_) {}
  }

  function restoreLog() {
    try {
      const previous = localStorage.getItem("polycall-probe-log");
      if (previous)
        output.textContent = `${previous}\n--- page reopened ---\n`;
    } catch (_) {}
  }

  function makeCallee(id) {
    // A distinct FunctionExecutable/CodeBlock per callee is important here.
    return new Function("x", `return ((x + ${id + 1}) ^ ${0x1357 + id}) | 0;`);
  }

  function makeRunner(id) {
    // A fresh caller gives each round its own CallLinkInfo and polymorphic stub.
    return new Function("fn", "x", `return fn((x + ${id}) | 0);`);
  }

  function mildPressure(mebibytes) {
    // This encourages ordinary GC without attempting to shape reclaimed memory.
    const blocks = [];
    for (let i = 0; i < mebibytes; ++i) {
      const block = new Uint8Array(1024 * 1024);
      block[0] = i;
      block[block.length - 1] = i ^ 0x5a;
      checksum ^= block[0] ^ block[block.length - 1];
      blocks.push(block);
    }
    return blocks.length;
  }

  const yieldTurn = () => new Promise(resolve => setTimeout(resolve, 0));

  async function callerTeardown(round) {
    let callees = [];
    for (let i = 0; i < 8; ++i)
      callees.push(makeCallee(round * 32 + i));

    // Materialize callee code and train one caller as a polymorphic call site.
    for (let i = 0; i < callees.length; ++i) {
      for (let j = 0; j < 256; ++j)
        checksum ^= callees[i](j);
    }

    let runner = makeRunner(round);
    for (let i = 0; i < 8192; ++i)
      checksum ^= runner(callees[i & 3], i);

    // Dropping the caller exercises CallLinkInfo::~CallLinkInfo -> clearStub().
    runner = null;
    mildPressure(8);
    await yieldTurn();

    // Callee CodeBlock cleanup later walks its incoming-call intrusive list.
    callees = null;
    mildPressure(12);
    await yieldTurn();
  }

  async function stubReplacement(round) {
    let callees = [];
    for (let i = 0; i < 20; ++i)
      callees.push(makeCallee(0x400 + round * 32 + i));

    let runner = makeRunner(0x400 + round);
    for (let i = 0; i < callees.length; ++i) {
      for (let j = 0; j < 192; ++j)
        checksum ^= runner(callees[i], j);
    }

    // New variants repeatedly rebuild the polymorphic stub and can eventually
    // make the site virtual; both transitions call clearStub().
    mildPressure(8);
    await yieldTurn();
    runner = null;
    callees = null;
    mildPressure(12);
    await yieldTurn();
  }

  async function run(kind, rounds) {
    if (busy)
      return;
    busy = true;
    buttons.forEach(button => button.disabled = true);
    try {
      log(`start: kind=${kind}, rounds=${rounds}, UA=${navigator.userAgent}`);
      log(`Function=${typeof Function}, Promise=${typeof Promise}, localStorage=${typeof localStorage}`);
      for (let round = 0; round < rounds; ++round) {
        if (kind === "primary" || kind === "both")
          await callerTeardown(round);
        if (kind === "secondary" || kind === "both")
          await stubReplacement(round);
        log(`round ${round + 1}/${rounds} survived; checksum=${checksum | 0}`);
      }
      log("probe completed. Keep the page open for 30 seconds in case cleanup is delayed.");
      setTimeout(() => log("survived delayed cleanup (10 seconds)"), 10000);
      setTimeout(() => log("survived delayed cleanup (30 seconds)"), 30000);
    } catch (error) {
      log(`JavaScript exception: ${error && (error.stack || error)}`);
    } finally {
      busy = false;
      buttons.forEach(button => button.disabled = false);
    }
  }

  window.addEventListener("error", event => log(`window error: ${event.message}`));
  window.addEventListener("unhandledrejection", event => log(`rejection: ${event.reason}`));
  document.querySelector("#primary").onclick = () => run("primary", 1);
  document.querySelector("#secondary").onclick = () => run("secondary", 1);
  document.querySelector("#stress").onclick = () => run("both", 16);
  document.querySelector("#clear").onclick = () => {
    output.textContent = "";
    try { localStorage.removeItem("polycall-probe-log"); } catch (_) {}
    log("saved log cleared");
  };

  restoreLog();
  log("Ready. Test caller teardown first.");
})();
</script>
