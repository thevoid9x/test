<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PS4 Web Audio WaveShaper NaN</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; }
  body { max-width: 820px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  button { margin: .4rem .4rem .4rem 0; padding: .75rem 1rem; font-size: 1rem; }
  pre { min-height: 18rem; padding: 1rem; white-space: pre-wrap; overflow-wrap: anywhere; background: #1d1d1d; border: 1px solid #444; }
  .warning { color: #ffd479; }
</style>

<h1>PS4 Web Audio WaveShaper NaN</h1>
<p class="warning">Test</p>
<button id="control">Run normal control</button>
<button id="nan">Run one NaN probe</button>
<button id="mixed">Run mixed-NaN probe</button>
<button id="repeat">Run 32 NaN probes</button>
<button id="clear">Clear saved log</button>
<pre id="log"></pre>

<script>
(() => {
  "use strict";

  const output = document.querySelector("#log");
  const buttons = [...document.querySelectorAll("button")];
  const OfflineContext = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  let busy = false;

  function log(message) {
    const line = `[${new Date().toISOString()}] ${message}`;
    output.textContent += `${line}\n`;
    console.log(line);
    try {
      localStorage.setItem("waveshaper-nan-probe-log", output.textContent.slice(-24000));
    } catch (_) {}
  }

  function summarize(data) {
    let finite = 0;
    let nan = 0;
    let infinite = 0;
    let min = Infinity;
    let max = -Infinity;
    for (let i = 0; i < data.length; ++i) {
      const value = data[i];
      if (Number.isNaN(value))
        ++nan;
      else if (!Number.isFinite(value))
        ++infinite;
      else {
        ++finite;
        min = Math.min(min, value);
        max = Math.max(max, value);
      }
    }
    const first = Array.from(data.slice(0, 8), value => Number.isNaN(value) ? "NaN" : String(value));
    return `finite=${finite}, NaN=${nan}, infinite=${infinite}, min=${min}, max=${max}, first=[${first.join(", ")}]`;
  }

  async function renderOnce(mode, index) {
    if (typeof OfflineContext !== "function")
      throw new Error("OfflineAudioContext is not exposed");

    const frameCount = 256;
    const context = new OfflineContext(1, frameCount, 44100);
    const source = context.createBufferSource();
    const inputBuffer = context.createBuffer(1, frameCount, 44100);
    const input = inputBuffer.getChannelData(0);

    if (mode === "control") {
      for (let i = 0; i < input.length; ++i)
        input[i] = (i / (input.length - 1)) * 2 - 1;
    } else if (mode === "mixed") {
      for (let i = 0; i < input.length; ++i)
        input[i] = (i & 1) ? NaN : 0.25;
    } else
      input.fill(NaN);

    source.buffer = inputBuffer;
    const shaper = context.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < curve.length; ++i)
      curve[i] = (i / (curve.length - 1)) * 2 - 1;
    shaper.curve = curve;
    shaper.oversample = "none";

    source.connect(shaper);
    shaper.connect(context.destination);
    source.start(0);
    log(`probe ${index}: starting ${mode} offline render`);
    const rendered = await context.startRendering();
    log(`probe ${index}: render resolved; ${summarize(rendered.getChannelData(0))}`);
  }

  async function run(mode, count) {
    if (busy)
      return;
    busy = true;
    buttons.forEach(button => button.disabled = true);
    try {
      log(`start: mode=${mode}, count=${count}, UA=${navigator.userAgent}`);
      log(`OfflineAudioContext=${typeof OfflineContext}, AudioContext=${typeof (window.AudioContext || window.webkitAudioContext)}, WaveShaper factory will be checked during render`);
      for (let i = 1; i <= count; ++i)
        await renderOnce(mode, i);
      log(`completed ${count} ${mode} render(s)`);
      setTimeout(() => log("survived delayed audio cleanup (10 seconds)"), 10000);
    } catch (error) {
      log(`probe stopped: ${error && (error.stack || error)}`);
    } finally {
      busy = false;
      buttons.forEach(button => button.disabled = false);
    }
  }

  window.addEventListener("error", event => log(`window error: ${event.message}`));
  window.addEventListener("unhandledrejection", event => log(`rejection: ${event.reason}`));
  document.querySelector("#control").onclick = () => run("control", 1);
  document.querySelector("#nan").onclick = () => run("nan", 1);
  document.querySelector("#mixed").onclick = () => run("mixed", 1);
  document.querySelector("#repeat").onclick = () => run("nan", 32);
  document.querySelector("#clear").onclick = () => {
    output.textContent = "";
    try { localStorage.removeItem("waveshaper-nan-probe-log"); } catch (_) {}
    log("saved log cleared");
  };

  try {
    const previous = localStorage.getItem("waveshaper-nan-probe-log");
    if (previous)
      output.textContent = `${previous}\n--- page reopened ---\n`;
  } catch (_) {}
  log("Ready. Run the normal control first.");
})();
</script>
